<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceder — Guardias Colegio</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1e3a5f 0%, #2d5f8a 100%); min-height: 100vh; display: flex; align-items: center; }
  .login-card { border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-check text-white" style="font-size:3rem;"></i>
        <h2 class="text-white mt-2 fw-bold">Guardias Colegio</h2>
      </div>
      <div class="card login-card">
        <div class="card-body p-4">
          <h5 class="card-title mb-4 text-center">Iniciar sesión</h5>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }}">{{ msg }}</div>
            {% endfor %}
          {% endwith %}
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" placeholder="tu@email.com" required autofocus>
            </div>
            <div class="mb-4">
              <label class="form-label">Contraseña</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
          </form>
        </div>
      </div>
      <p class="text-center text-white-50 mt-3 small">Acceso solo para personal del centro</p>
    </div>
  </div>
</div>
</body>
</html>
