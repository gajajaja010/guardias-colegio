<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Error — Guardias Colegio</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body { background: #f0f4f8; display: flex; align-items: center; min-height: 100vh; }</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
      <div class="fs-1 mb-3">⚠️</div>
      <h2 class="fw-bold mb-2">Algo ha ido mal</h2>
      <p class="text-muted mb-4">
        Ha ocurrido un error en el servidor. El equipo técnico lo verá en los logs.<br>
        Por favor, <strong>recarga la página</strong> e inténtalo de nuevo.
      </p>
      <a href="/" class="btn btn-primary me-2">
        <i class="bi bi-house me-1"></i>Ir al inicio
      </a>
      <button onclick="location.reload()" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-clockwise me-1"></i>Recargar
      </button>
    </div>
  </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
