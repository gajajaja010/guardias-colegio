<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crear contraseña — Guardias Colegio</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1e3a5f 0%, #2d5f8a 100%); min-height: 100vh; display: flex; align-items: center; }
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-check text-white" style="font-size:3rem;"></i>
        <h2 class="text-white mt-2 fw-bold">Bienvenido/a</h2>
        <p class="text-white-50">Colegio La Asunción — Donostia</p>
      </div>
      <div class="card border-0 shadow-lg" style="border-radius:16px;">
        <div class="card-body p-4">
          <h5 class="text-center mb-1">Hola, {{ profesor.nombre.split()[0] }}</h5>
          <p class="text-muted text-center small mb-4">Crea tu contraseña para acceder al sistema de guardias</p>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} small">{{ msg }}</div>
            {% endfor %}
          {% endwith %}

          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" value="{{ profesor.email }}" readonly disabled>
            </div>
            <div class="mb-3">
              <label class="form-label">Nueva contraseña <span class="text-danger">*</span></label>
              <input type="password" name="password" class="form-control" minlength="6" required autofocus
                placeholder="Mínimo 6 caracteres">
            </div>
            <div class="mb-4">
              <label class="form-label">Repite la contraseña <span class="text-danger">*</span></label>
              <input type="password" name="confirm" class="form-control" required placeholder="Repite la contraseña">
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-check-circle me-2"></i>Crear cuenta y entrar
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
